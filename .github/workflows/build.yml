name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Flutter project
        run: flutter create --org com.basketball --project-name controller tmp_app

      - name: Copy lib files
        run: cp -r lib/* tmp_app/lib/

      - name: Copy pubspec
        run: cp pubspec.yaml tmp_app/pubspec.yaml

      - name: Copy google-services
        run: cp android/app/google-services.json tmp_app/android/app/google-services.json

      - name: Write app build.gradle
        run: |
          cat > tmp_app/android/app/build.gradle << 'GRADLE'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
              id "com.google.gms.google-services"
          }
          android {
              namespace "com.basketball.controller"
              compileSdk flutter.compileSdkVersion
              ndkVersion flutter.ndkVersion
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions { jvmTarget = '1.8' }
              defaultConfig {
                  applicationId "com.basketball.controller"
                 minSdkVersion 21
                 targetSdkVersion 34
                  versionCode 1
                versionName "1.0"
              }
              buildTypes {
                  release { signingConfig signingConfigs.debug }
              }
          }
          flutter { source '../..' }
          dependencies {
              implementation platform('com.google.firebase:firebase-bom:32.7.0')
              implementation 'com.google.firebase:firebase-database'
          }
          GRADLE

      - name: Write root build.gradle
        run: |
          cat > tmp_app/android/build.gradle << 'GRADLE'
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
                  classpath 'com.google.gms:google-services:4.4.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          GRADLE

      - name: Install dependencies
        working-directory: tmp_app
        run: flutter pub get

      - name: Build APK
        working-directory: tmp_app
        run: flutter build apk --release

      - name: List APK files
        run: find tmp_app/build -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: basketball-controller-apk
          path: tmp_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
