name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create fresh Flutter project
        run: flutter create --org com.basketball --project-name basketball_controller tmp_app

      - name: Copy lib files
        run: |
          cp -r lib/* tmp_app/lib/
          cp pubspec.yaml tmp_app/pubspec.yaml

      - name: Copy Firebase config
        run: |
          cp android/app/google-services.json tmp_app/android/app/google-services.json

      - name: Add Firebase to build.gradle
        run: |
          cd tmp_app
          sed -i "s/id 'com.android.application'/id 'com.android.application'\n    id 'com.google.gms.google-services'/" android/app/build.gradle
          sed -i "s/dependencies {/dependencies {\n    implementation platform('com.google.firebase:firebase-bom:32.7.0')\n    implementation 'com.google.firebase:firebase-database'/" android/app/build.gradle
          sed -i "s/id 'com.android.application'/id 'com.android.application'/" android/build.gradle
          echo "classpath 'com.google.gms:google-services:4.4.0'" >> android/build.gradle || true

      - name: Add Google services to project build.gradle
        run: |
          cd tmp_app
          sed -i "/classpath 'com.android.tools.build:gradle/a\\        classpath 'com.google.gms:google-services:4.4.0'" android/build.gradle

      - name: Install dependencies
        run: |
          cd tmp_app
          flutter pub get

      - name: Build APK
        run: |
          cd tmp_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: basketball-controller-apk
          path: tmp_app/build/app/outputs/flutter-apk/app-release.apk
